version: '3.8'

services:
  web-pipeline:
    container_name: knowledge_hub_pipeline_web
    image: node:20-alpine
    ports:
      - "3001:3000"
    volumes:
      - .:/app
    environment:
      - MONGODB_URI=mongodb://db-pipeline:27017/university-notes
      - NODE_OPTIONS=--max-old-space-size=1024
    command: ["sh", "-c", "npm install && npm run dev -- -p 3000 -H 0.0.0.0"]
    depends_on:
      - db-pipeline

  db-pipeline:
    container_name: knowledge_hub_pipeline_db
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongodb_pipeline_data:/data/db

volumes:
  mongodb_pipeline_data:
